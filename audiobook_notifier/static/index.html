<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audiobook Notifier</title>
  <style>
    :root {
      --bg-page:         #f5f5f5;
      --bg-card:         #ffffff;
      --bg-hover:        #fafafa;
      --bg-btn-hover:    #f0f0f0;
      --bg-th:           #f9f9f9;
      --bg-danger-hover: #fff0f0;
      --color-text:      #222222;
      --color-muted:     #888888;
      --color-meta:      #666666;
      --color-th:        #444444;
      --color-danger:    #cc0000;
      --border-card:     #dddddd;
      --border-input:    #cccccc;
      --border-btn:      #888888;
      --border-divider:  #eeeeee;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page:         #1a1a1a;
        --bg-card:         #2a2a2a;
        --bg-hover:        #333333;
        --bg-btn-hover:    #3a3a3a;
        --bg-th:           #333333;
        --bg-danger-hover: #3a1010;
        --color-text:      #e0e0e0;
        --color-muted:     #888888;
        --color-meta:      #999999;
        --color-th:        #aaaaaa;
        --color-danger:    #ff6666;
        --border-card:     #444444;
        --border-input:    #555555;
        --border-btn:      #666666;
        --border-divider:  #3a3a3a;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg-page);
      color: var(--color-text);
      padding: 2rem 1rem;
    }

    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }

    /* Add form */
    main { max-width: 700px; margin: 0 auto; }

    #add-section {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    #add-section h2 { font-size: 1rem; margin-bottom: 0.75rem; }
    #add-form { display: flex; gap: 0.5rem; }
    #url-input {
      flex: 1;
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border-input);
      border-radius: 4px;
      font-size: 0.9rem;
      background: var(--bg-card);
      color: var(--color-text);
    }
    button {
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--border-btn);
      border-radius: 4px;
      background: var(--bg-card);
      color: var(--color-text);
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    button:hover { background: var(--bg-btn-hover); }
    button.danger { border-color: var(--color-danger); color: var(--color-danger); }
    button.danger:hover { background: var(--bg-danger-hover); }
    button:disabled { opacity: 0.5; cursor: default; }

    #add-error { color: var(--color-danger); font-size: 0.85rem; margin-top: 0.5rem; }

    /* Upcoming releases */
    #upcoming-section {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    #upcoming-section h2 { font-size: 1rem; margin-bottom: 0.75rem; }
    #upcoming-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
    #upcoming-list li { font-size: 0.88rem; display: flex; align-items: center; gap: 0.75rem; }
    #upcoming-list .upcoming-text { display: flex; flex-direction: column; gap: 0.15rem; }
    #upcoming-list .upcoming-date { color: var(--color-meta); }
    #upcoming-list .upcoming-series { color: var(--color-muted); }

    /* Series list */
    #series-container { display: flex; flex-direction: column; gap: 1rem; }

    .series-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 6px;
      overflow: hidden;
    }

    .series-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      user-select: none;
    }
    .series-header:hover { background: var(--bg-hover); }

    .series-title { font-weight: 600; flex: 1; font-size: 0.95rem; }
    .series-title.pending { color: var(--color-muted); font-style: italic; }

    .series-meta { font-size: 0.78rem; color: var(--color-meta); white-space: nowrap; }

    /* Books table */
    .books-container { display: none; border-top: 1px solid var(--border-divider); overflow-x: auto; }
    .books-container.open { display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th, td { text-align: left; padding: 0.45rem 0.75rem; border-bottom: 1px solid var(--border-divider); }
    th { background: var(--bg-th); font-weight: 600; color: var(--color-th); }
    tr:last-child td { border-bottom: none; }

    .cover-stack { position: relative; height: 36px; flex-shrink: 0; }
    .stack-thumb { position: absolute; width: 36px; height: 36px; object-fit: cover; border-radius: 3px; border: 2px solid var(--bg-card); }

    .col-cover { width: 52px; padding-right: 4px; }
    .cover-thumb { display: block; width: 40px; height: 40px; object-fit: cover; border-radius: 3px; }
    #upcoming-list .cover-thumb { width: 44px; height: 44px; border-radius: 4px; flex-shrink: 0; }

    .empty-state { padding: 1rem; color: var(--color-muted); font-size: 0.85rem; }

    #loading { color: var(--color-muted); font-size: 0.9rem; }
  </style>
</head>
<body>
  <main>
    <h1>Audiobook Notifier</h1>

    <section id="add-section">
      <h2>Track a new series</h2>
      <form id="add-form">
        <input
          type="url"
          id="url-input"
          placeholder="https://www.audible.de/series/…"
          required
        >
        <button type="submit">Add series</button>
      </form>
      <div id="add-error"></div>
    </section>

    <section id="upcoming-section" style="display:none">
      <h2>Upcoming releases</h2>
      <ul id="upcoming-list"></ul>
    </section>

    <div id="loading">Loading…</div>
    <div id="series-container"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
