<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audiobook Notifier</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/icon.png" type="image/png">
  <style>
    body { padding: 2rem 1rem; }

    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
    h1 .signout { margin-left: auto; font-size: 0.75rem; color: var(--color-muted); text-decoration: none; }
    h1 .signout:hover { color: var(--color-text); }

    main { max-width: 900px; margin: 0 auto; }

    #add-section {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    #add-section h2 { font-size: 1rem; margin-bottom: 0.75rem; }
    #add-form { display: flex; gap: 0.5rem; }
    #url-input { flex: 1; }

    #add-error { color: var(--color-danger); font-size: 0.85rem; margin-top: 0.5rem; }

    #upcoming-section {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    #upcoming-section h2 { font-size: 1rem; margin-bottom: 0.75rem; }
    #upcoming-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
    #upcoming-list li { font-size: 0.88rem; display: flex; align-items: center; gap: 0.75rem; }
    #upcoming-list .upcoming-text { display: flex; flex-direction: column; gap: 0.15rem; }
    #upcoming-list .upcoming-date { color: var(--color-meta); }
    #upcoming-list .upcoming-series { color: var(--color-muted); }

    #series-container { display: flex; flex-direction: column; gap: 1rem; }

    .series-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 6px;
      overflow: hidden;
    }

    .series-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      user-select: none;
    }
    .series-header:hover { background: var(--bg-hover); }

    .series-title-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0.15rem; }
    .series-title { font-weight: 600; font-size: 0.95rem; }
    .series-title.pending { color: var(--color-muted); font-style: italic; }

    .series-meta { font-size: 0.78rem; color: var(--color-meta); }

    .books-container { display: none; border-top: 1px solid var(--border-divider); overflow-x: auto; }
    .books-container.open { display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th, td { text-align: left; padding: 0.45rem 0.75rem; border-bottom: 1px solid var(--border-divider); }
    th { background: var(--bg-th); font-weight: 600; color: var(--color-th); }
    tr:last-child td { border-bottom: none; }

    .cover-stack { display: flex; align-items: center; flex-shrink: 0; }
    .stack-thumb { position: relative; width: 36px; height: 36px; object-fit: cover; border-radius: 3px; border: 2px solid var(--bg-card); }
    .stack-thumb + .stack-thumb { margin-left: -16px; }

    .col-cover { width: 52px; padding-right: 4px; }
    .cover-thumb { display: block; width: 40px; height: 40px; object-fit: cover; border-radius: 3px; }
    #upcoming-list .cover-thumb { width: 44px; height: 44px; border-radius: 4px; flex-shrink: 0; }

    .empty-state { padding: 1rem; color: var(--color-muted); font-size: 0.85rem; }

    #loading { color: var(--color-muted); font-size: 0.9rem; }

    @media (max-width: 560px) {
      body { padding: 1rem 0.5rem; }
      button { min-height: 44px; padding: 0.4rem 0.75rem; }
      .col-narrator, .col-language, .col-duration { display: none; }
      .stack-thumb + .stack-thumb { margin-left: -24px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>
      <img src="/icon.png" alt="" height="32" style="border-radius:4px;flex-shrink:0">
      Audiobook Notifier
      {% if auth_enabled %}<a href="/logout" class="signout">Sign out</a>{% endif %}
    </h1>

    <section id="add-section">
      <h2>Track a new series</h2>
      <form id="add-form">
        <input
          type="url"
          id="url-input"
          placeholder="https://www.audible.de/series/…"
          required
        >
        <button type="submit">Add series</button>
      </form>
      <div id="add-error"></div>
    </section>

    <section id="upcoming-section" style="display:none">
      <h2>Upcoming releases</h2>
      <ul id="upcoming-list"></ul>
    </section>

    <div id="loading">Loading…</div>
    <div id="series-container"></div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
